<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thermal Earth | IMD Mumbai ECOSTRESS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #060913; color: #ffffff; display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        
        .sidebar { width: 400px; max-width: 400px; min-width: 400px; background-color: #0d1221; border-right: 1px solid #1f2937; padding: 30px; display: flex; flex-direction: column; gap: 23px; overflow-y: auto; }
        .logo { font-size: 1.25rem; font-weight: 600; background: linear-gradient(to right, #f43f5e, #be123c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .section-title { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; }
        .input-field { width: 100%; padding: 12px; background-color: #1e293b; border: 1px solid #334155; border-radius: 8px; color: white; outline: none; font-size: 0.9rem; }
        
        .action-btn { width: 100%; padding: 14px; background-color: #1e293b; border: 1px solid #334155; color: #e2e8f0; border-radius: 8px; font-size: 0.95rem; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.3s; }
        .action-btn:hover { background-color: #2563eb; }
        .btn-active { background: linear-gradient(135deg, #f43f5e, #be123c) !important; color: white !important; border-color: #f43f5e !important; }
        
        #map { position: relative; height: 100vh; width: calc(100vw - 400px); background-color: #060913; z-index: 1; }
        .or-divider { text-align: center; color: #4b5563; font-size: 0.8rem; text-transform: uppercase; margin: 5px 0; font-weight: 600; }
        
        .driver-panel { position: absolute; bottom: 30px; right: 30px; background: rgba(13, 18, 33, 0.95); padding: 20px; border-radius: 12px; border: 1px solid #f43f5e; width: 350px; z-index: 1000; backdrop-filter: blur(10px); }
        .driver-panel h4 { color: #f97316; margin-bottom: 8px; font-size: 1rem; }
        .driver-panel p { font-size: 0.85rem; color: #e2e8f0; line-height: 1.5; }
        
        .slider-box { background-color: #1e293b; padding: 15px; border-radius: 8px; display: flex; flex-direction: column; gap: 12px; }
        .slider-group { display: flex; flex-direction: column; gap: 4px; }
        .slider-input { width: 100%; accent-color: #10b981; }
        
        .map-legend { position: absolute; top: 20px; right: 20px; background: #0d1221; padding: 15px; border-radius: 10px; border: 1px solid #334155; width: 250px; z-index: 9999; display: none; }
        .legend-bar { height: 14px; width: 100%; background: linear-gradient(to right, #000004, #3b0f70, #8c2981, #de4968, #fe9f6d, #fcfdbf); margin-bottom: 6px; }
        .legend-labels { display: flex; justify-content: space-between; font-size: 0.8rem; }
        
        .info-panel { position: absolute; top: 20px; left: 20px; background: rgba(13, 18, 33, 0.9); padding: 12px; border-radius: 8px; border: 1px solid #334155; max-width: 300px; font-size: 0.8rem; z-index: 999; }
        .info-panel p { margin: 4px 0; color: #94a3b8; }
        .info-panel .value { color: #10b981; font-weight: 600; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">Thermal Earth Framework</div>
        <hr style="border: 0; border-top: 1px solid #1f2937;">

        <div style="display: flex; flex-direction: column; gap: 10px;">
            <div class="section-title">1. Locate Mumbai Region</div>
            <input type="text" id="areaName" class="input-field" placeholder="Type neighborhood (Bandra, Dharavi)...">
            <div class="or-divider">OR</div>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="latitude" class="input-field" placeholder="Latitude" step="0.0001">
                <input type="number" id="longitude" class="input-field" placeholder="Longitude" step="0.0001">
            </div>
            <button class="action-btn" style="background-color: #2563eb; justify-content: center;" onclick="locateRegion()">Find Location</button>
        </div>

        <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 10px;">
            <div class="section-title">2. Analysis Workflow</div>
            <button id="stressMapBtn" class="action-btn" onclick="showRealEcostressMap()"><span>See Heat Stress Map (ECOSTRESS)</span> ➔</button>
            <button id="hotspotsBtn" class="action-btn" onclick="showHeatSpots()"><span>See Heat Spots (AI-Detected)</span> ➔</button>
            <button id="driversBtn" class="action-btn" onclick="activateDriversHover()"><span>See key drivers of heat</span> ➔</button>
            <button id="interventionsBtn" class="action-btn" onclick="showInterventions()"><span>Show cooling interventions</span> ➔</button>

            <div id="interventionControls" class="slider-box" style="display: none;">
                <div id="activeTargetLabel" style="font-size:0.8rem; font-weight:600; color:#f97316; margin-bottom:5px;">Target: Select a Hotspot on Map</div>
                
                <div class="slider-group">
                    <label style="font-size:0.8rem; display:flex; justify-content:space-between;"><span>🌲 Urban Greening</span> <b id="vegVal">0%</b></label>
                    <input type="range" class="slider-input" id="vegSlider" min="0" max="100" value="0" oninput="runCoolingSimulation()">
                </div>
                
                <div class="slider-group">
                    <label style="font-size:0.8rem; display:flex; justify-content:space-between;"><span>🏢 Cool Roofs</span> <b id="infraVal">0%</b></label>
                    <input type="range" class="slider-input" id="infraSlider" min="0" max="100" value="0" oninput="runCoolingSimulation()">
                </div>

                <div class="slider-group">
                    <label style="font-size:0.8rem; display:flex; justify-content:space-between;"><span>🍃 Particulate Reduction</span> <b id="pmVal">0%</b></label>
                    <input type="range" class="slider-input" id="pmSlider" min="0" max="100" value="0" oninput="runCoolingSimulation()">
                </div>

                <div class="slider-group">
                    <label style="font-size:0.8rem; display:flex; justify-content:space-between;"><span>🚗 Traffic Mitigation</span> <b id="no2Val">0%</b></label>
                    <input type="range" class="slider-input" id="no2Slider" min="0" max="100" value="0" oninput="runCoolingSimulation()">
                </div>

                <div class="slider-group">
                    <label style="font-size:0.8rem; display:flex; justify-content:space-between;"><span>🏭 Industrial Reduction</span> <b id="so2Val">0%</b></label>
                    <input type="range" class="slider-input" id="so2Slider" min="0" max="100" value="0" oninput="runCoolingSimulation()">
                </div>

                <div style="border-top: 1px solid #334155; padding-top: 8px; text-align: center; font-size: 0.8rem;">
                    Simulated Temperature: <br>
                    <span id="impactTemp" style="font-size: 1.2rem; font-weight: 700; color: #f43f5e;">--</span>
                </div>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <div id="mapLegend" class="map-legend">
        <div style="font-size:0.75rem; margin-bottom:5px; color:#94a3b8;">LAND SURFACE TEMP</div>
        <div class="legend-bar"></div>
        <div class="legend-labels"><span>28.5°C</span><span>48.0°C</span></div>
    </div>

    <div id="infoPanel" class="info-panel" style="display: none;">
        <p><strong>🌡️ Hotspot Analysis</strong></p>
        <p>Temp: <span class="value" id="infoPanelTemp">--</span></p>
        <p>NDVI: <span class="value" id="infoPanelNDVI">--</span></p>
        <p>NDBI: <span class="value" id="infoPanelNDBI">--</span></p>
        <p>Type: <span class="value" id="infoPanelType">--</span></p>
    </div>

    <div id="driverPanel" class="driver-panel">
        <h4 id="panelTitle">Diagnostic Engine</h4>
        <p id="panelText">Hover over a hotspot to view key thermal drivers.</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script src="gdrive-data-loader.js"></script>
    <script>
        // ============ Map Initialization ============
        // Expanded bounds limit slightly to accommodate full extent of image overlay
        var boundsLimit = [[18.60, 72.40], [19.65, 73.40]];
        var map = L.map('map', {
            center: [19.0760, 72.8777],
            zoom: 11,
            minZoom: 10,
            maxZoom: 15,
            maxBounds: boundsLimit,
            maxBoundsViscosity: 1.0
        });

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CARTO'
        }).addTo(map);

        // ============ State Management ============
        var ecostressLayer, geojsonLayer, customMarker;
        var hoverWorkflowActive = false;
        var interventionWorkflowActive = false;
        var selectedHotspotData = null;
        var selectedLayerRef = null;
        var allHotspotsData = null;
        var activeHoveredFeature = null; // Tracks current hovered hotspot to prevent event race conditions

        // ============ ECOSTRESS Heat Stress Map ============
        function showRealEcostressMap() {
            document.getElementById('stressMapBtn').classList.add('btn-active');
            if (ecostressLayer) map.removeLayer(ecostressLayer);
            
            var imageUrl = 'mumbai_ecostress.png';
            var imageBounds = [[18.6323, 72.4829], [19.6395, 73.3757]];
            ecostressLayer = L.imageOverlay(imageUrl, imageBounds, { opacity: 0.40, zIndex: 5 }).addTo(map);
            document.getElementById('mapLegend').style.display = 'block';
        }

        // ============ Physics-Backed Hotspot Generation ============
        function showHeatSpots() {
            if (!ecostressLayer) { 
                alert("Enable Thermal Layer first!"); 
                return; 
            }
            
            document.getElementById('hotspotsBtn').classList.add('btn-active');
            if (geojsonLayer) map.removeLayer(geojsonLayer);

            // Generate hotspots from physics-backed criteria
            generatePhysicsBackedHotspots();
        }

        function generatePhysicsBackedHotspots() {
            // Fetch or use pre-computed hotspots
            fetch('hotspots.geojson?nocache=' + Math.random())
                .then(res => res.json())
                .then(data => {
                    allHotspotsData = data;
                    
                    // Enhance with physics calculations
                    data.features = data.features.map(feature => {
                        const props = feature.properties;
                        
                        // Safely extract coordinates based on Geometry Type to avoid runtime crashes
                        let coords = null;
                        if (feature.geometry && feature.geometry.type) {
                            if (feature.geometry.type === 'Point') {
                                coords = feature.geometry.coordinates;
                            } else if (feature.geometry.type === 'Polygon') {
                                coords = feature.geometry.coordinates[0][0];
                            } else if (feature.geometry.type === 'MultiPolygon') {
                                coords = feature.geometry.coordinates[0][0][0];
                            }
                        }
                        
                        // Determine if coastal (fixed longitude threshold for Mumbai west coast)
                        const isCoastal = coords ? coords[0] < 72.82 : false;
                        props.is_coastal = isCoastal; // Saved directly to properties
                        
                        // Calculate drivers
                        if (!props.drivers || props.drivers.length === 0) {
                            props.drivers = calculateDriverString(props);
                        }
                        
                        return feature;
                    });
                    
                    // Filter features that qualify as hotspots based on physics threshold
                    data.features = data.features.filter(feature => {
                        const props = feature.properties;
                        const threshold = props.is_coastal ? 37 : 40;
                        return props.temp >= threshold;
                    });
                    
                    // Render hotspots on map
                    geojsonLayer = L.geoJSON(data, {
                        style: function(feature) {
                            return { 
                                color: '#f43f5e', 
                                weight: 2, 
                                fillColor: '#be123c', 
                                fillOpacity: 0.3, 
                                zIndex: 10 
                            };
                        },
                        onEachFeature: attachHotspotEvents
                    }).addTo(map);

                    console.log("Hotspots loaded and rendered:", data.features.length);
                });
        }

        function calculateDriverString(props) {
            const uhi = (1 - props.ndvi) * 100;
            const builtUp = (props.ndbi + 0.5) * 100 * 0.6;
            const vegDeficit = Math.max(0, (0.4 - props.ndvi) * 250);
            
            return `UHI: ${Math.round(uhi)}% | Built-up: ${Math.round(builtUp)}% | Veg Deficit: ${Math.round(vegDeficit)}m² | Coastal: ${props.is_coastal ? 'Yes' : 'No'}`;
        }

        function attachHotspotEvents(feature, layer) {
            // Hover event for drivers
            layer.on('mouseover', function() {
                if (!hoverWorkflowActive || interventionWorkflowActive) return;
                
                activeHoveredFeature = feature; // Set current hovered feature
                
                layer.setStyle({ 
                    color: '#f97316', 
                    fillColor: '#ea580c', 
                    fillOpacity: 0.55 
                });
                
                updateDriverPanel(feature.properties);
                updateInfoPanel(feature.properties);
            });
            
            layer.on('mouseout', function() {
                if (!hoverWorkflowActive || interventionWorkflowActive) return;
                if (selectedLayerRef === layer) return;
                
                layer.setStyle({ 
                    color: '#f43f5e', 
                    fillColor: '#be123c', 
                    fillOpacity: 0.3 
                });
                
                // Only hide the info panel if we are leaving the actual active hovered feature
                if (activeHoveredFeature === feature) {
                    document.getElementById('infoPanel').style.display = 'none';
                    activeHoveredFeature = null;
                }
            });

            // Click event for intervention selection
            layer.on('click', function() {
                if (!interventionWorkflowActive) return;
                
                if (geojsonLayer) {
                    geojsonLayer.setStyle({ 
                        color: '#f43f5e', 
                        fillColor: '#be123c', 
                        fillOpacity: 0.3 
                    });
                }
                
                selectedHotspotData = feature.properties;
                selectedLayerRef = layer;
                
                layer.setStyle({ 
                    color: '#00f2fe', 
                    fillColor: '#00c6ff', 
                    fillOpacity: 0.45 
                });
                
                // Reset sliders
                document.getElementById('activeTargetLabel').innerText = `Active: ${selectedHotspotData.name}`;
                resetSliders();
                
                updateSimulationDisplay();
            });
        }

        function updateDriverPanel(props) {
            document.getElementById('panelTitle').innerText = props.name + ` (${props.temp}°C)`;
            document.getElementById('panelText').innerText = props.drivers;
        }

        function updateInfoPanel(props) {
            document.getElementById('infoPanelTemp').innerText = props.temp + "°C";
            document.getElementById('infoPanelNDVI').innerText = props.ndvi.toFixed(3);
            document.getElementById('infoPanelNDBI').innerText = props.ndbi.toFixed(3);
            document.getElementById('infoPanelType').innerText = props.is_coastal ? "Coastal" : "Inland";
            document.getElementById('infoPanel').style.display = 'block';
        }

        // ============ Drivers Hover Workflow ============
        function activateDriversHover() {
            if (!geojsonLayer) { 
                alert("Load Hotspots First!"); 
                return; 
            }
            
            document.getElementById('driversBtn').classList.add('btn-active');
            document.getElementById('interventionsBtn').classList.remove('btn-active');
            document.getElementById('interventionControls').style.display = 'none';
            
            hoverWorkflowActive = true;
            interventionWorkflowActive = false;
            document.getElementById('driverPanel').style.display = 'block';
        }

        // ============ Cooling Interventions Workflow ============
        function showInterventions() {
            if (!geojsonLayer) { 
                alert("Enable Hotspots First!"); 
                return; 
            }
            
            document.getElementById('interventionsBtn').classList.add('btn-active');
            document.getElementById('driversBtn').classList.remove('btn-active');
            document.getElementById('driverPanel').style.display = 'none';
            document.getElementById('interventionControls').style.display = 'block';
            
            hoverWorkflowActive = false;
            interventionWorkflowActive = true;
            
            resetSliders();
            alert("Click on a hotspot polygon to initialize its custom cooling sliders!");
        }

        function resetSliders() {
            ['veg', 'infra', 'pm', 'no2', 'so2'].forEach(type => {
                document.getElementById(type + 'Slider').value = 0;
                document.getElementById(type + 'Val').innerText = "0%";
            });
        }

        // ============ Physics-Backed Cooling Simulation ============
        function runCoolingSimulation() {
            if (!selectedHotspotData || !selectedLayerRef) {
                alert("Please click a hotspot first!");
                return;
            }

            const veg = parseInt(document.getElementById('vegSlider').value);
            const infra = parseInt(document.getElementById('infraSlider').value);
            const pm = parseInt(document.getElementById('pmSlider').value);
            const no2 = parseInt(document.getElementById('no2Slider').value);
            const so2 = parseInt(document.getElementById('so2Slider').value);
            
            // Update UI labels
            document.getElementById('vegVal').innerText = veg + "%";
            document.getElementById('infraVal').innerText = infra + "%";
            document.getElementById('pmVal').innerText = pm + "%";
            document.getElementById('no2Val').innerText = no2 + "%";
            document.getElementById('so2Val').innerText = so2 + "%";
            
            // Call physics-backed cooling calculation (defined in external script)
            if (typeof calculateCoolingEffect === 'function') {
                const result = calculateCoolingEffect(
                    selectedHotspotData.temp,
                    selectedHotspotData.ndvi,
                    selectedHotspotData.ndbi,
                    veg, infra, pm, no2, so2
                );
                updateSimulationDisplay(result);
            } else {
                console.error("calculateCoolingEffect function is not loaded.");
            }
        }

        function updateSimulationDisplay(result = null) {
            const impactDisplay = document.getElementById('impactTemp');
            
            if (!result || selectedHotspotData === null) {
                impactDisplay.innerText = (selectedHotspotData?.temp || '--') + "°C (Baseline)";
                impactDisplay.style.color = "#f43f5e";
                if (selectedLayerRef) {
                    selectedLayerRef.setStyle({ 
                        color: '#00f2fe', 
                        fillColor: '#00c6ff', 
                        fillOpacity: 0.45 
                    });
                }
                return;
            }
            
            impactDisplay.innerText = `${result.finalTemp}°C (-${result.totalReduction}°C)`;
            impactDisplay.style.color = "#10b981";
            
            // Visual feedback on map
            selectedLayerRef.setStyle({
                color: '#10b981',
                fillColor: '#059669',
                fillOpacity: Math.min(0.6, 0.20 + (result.totalReduction * 0.04))
            });
        }

        // ============ Location Search ============
        function locateRegion() {
            var region = document.getElementById('areaName').value.trim();
            var latInput = parseFloat(document.getElementById('latitude').value);
            var lonInput = parseFloat(document.getElementById('longitude').value);

            if (region) {
                var url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(region + ", Mumbai")}&limit=1`;
                fetch(url)
                    .then(res => res.json())
                    .then(data => {
                        if (data && data.length > 0) {
                            var lat = parseFloat(data[0].lat);
                            var lon = parseFloat(data[0].lon);
                            document.getElementById('latitude').value = lat.toFixed(4);
                            document.getElementById('longitude').value = lon.toFixed(4);
                            updateMapMarker(lat, lon, "Searched Area: " + region.toUpperCase());
                        } else {
                            alert("Location not found in Mumbai.");
                        }
                    })
                    .catch(err => {
                        console.error("OSM Nominatim API Error: ", err);
                        alert("Failed to reach location search service.");
                    });
            } else if (!isNaN(latInput) && !isNaN(lonInput)) {
                updateMapMarker(latInput, lonInput, "Custom Coordinates");
            }
        }

        function updateMapMarker(lat, lng, label) {
            if (customMarker) map.removeLayer(customMarker);
            customMarker = L.marker([lat, lng]).addTo(map)
                .bindPopup("<b>" + label + "</b><br>Lat: " + lat.toFixed(4) + "<br>Lng: " + lng.toFixed(4)).openPopup();
            map.setView([lat, lng], 13);
        }

        // Click on map to select location
        map.on('click', function(e) {
            document.getElementById('latitude').value = e.latlng.lat.toFixed(4);
            document.getElementById('longitude').value = e.latlng.lng.toFixed(4);
            document.getElementById('areaName').value = "";
            updateMapMarker(e.latlng.lat, e.latlng.lng, "Selected Position");
        });

        // Initialize pollution data on load safely
        window.addEventListener('load', function() {
            if (typeof initializeDummyPollutionData === 'function') {
                initializeDummyPollutionData();
            } else {
                console.warn("initializeDummyPollutionData was not found or failed to load from gdrive-data-loader.js.");
            }
        });
    </script>
</body>
</html>
